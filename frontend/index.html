<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>Chess<span class="accent">AI</span></h1>
        <p class="subtitle">Stockfish-powered opponent</p>
      </header>

      <main class="layout">
        <!-- Evaluation bar + board -->
        <div class="board-area">
          <div class="eval-bar" id="evalBar">
            <div class="eval-fill" id="evalFill"></div>
            <span class="eval-label" id="evalLabel">0.0</span>
          </div>

          <div class="board-wrapper">
            <div class="board" id="board"></div>
            <div class="board-overlay" id="boardOverlay" hidden>
              <p id="overlayText"></p>
            </div>
          </div>
        </div>

        <!-- Side panel -->
        <aside class="panel">
          <section class="panel-section">
            <h2>New game</h2>

            <label class="field-label">Play as</label>
            <div class="color-choice">
              <button
                class="color-btn active"
                data-color="white"
                id="colorWhiteBtn"
              >
                White
              </button>
              <button class="color-btn" data-color="black" id="colorBlackBtn">
                Black
              </button>
            </div>

            <label class="field-label" for="eloSlider">
              Stockfish strength — <span id="eloValue">1500</span> ELO
            </label>
            <input
              type="range"
              id="eloSlider"
              min="1320"
              max="3000"
              step="20"
              value="1500"
            />

            <button class="primary-btn" id="startBtn">Start game</button>
          </section>

          <section class="panel-section status-section">
            <h2>Status</h2>
            <p id="statusText" class="status-text">
              Set your options and start a game.
            </p>
          </section>
        </aside>
      </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
